name: Upload on version tag

on:
  push:
    tags:
      - '*'

jobs:
  build-and-upload:
    name: Build and upload to CurseForge/Modrinth
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Ensure secrets are present
        shell: bash
        env:
          CURSEFORGE_APIKEY: ${{ secrets.CURSEFORGE_APIKEY }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -z "$CURSEFORGE_APIKEY" ]; then
            echo "Missing GitHub Secret: CURSEFORGE_APIKEY"
            exit 1
          fi
          if [ -z "$MODRINTH_TOKEN" ]; then
            echo "Missing GitHub Secret: MODRINTH_TOKEN"
            exit 1
          fi

      - name: Build and upload
        shell: bash
        env:
          CURSEFORGE_APIKEY: ${{ secrets.CURSEFORGE_APIKEY }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon build upload
